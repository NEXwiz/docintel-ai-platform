version: "3.9"

services:
  backend:
    build: ./backend
    container_name: docintel_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - qdrant

  frontend:
    build: ./frontend
    container_name: docintel_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  qdrant:
    image: qdrant/qdrant
    container_name: docintel_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
